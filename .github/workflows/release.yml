# Release source of truth: GitHub Actions builds every artifact from scratch,
# then syncs the generated update feed to releases.sync-in.org for existing clients.
# When created, GitHub releases are always drafts. Build/sign failures do not
# create or update a GitHub release, and the HTTP update feed stays untouched.
# GitHub cannot branch-filter tag pushes; the prepare job is the preflight gate
# and every build job depends on it.
# Test rules:
# - tag push: test=false, sync the HTTP update feed only after every build/signature succeeds.
# - workflow_dispatch + test=true: any branch, build/sign only, no GitHub release and no HTTP sync.
# - workflow_dispatch + test=false: main only, require v<package.json version>, then sync HTTP after success.
name: Release binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Ignored when test=true. Empty uses v<version> for real releases.'
        required: false
        type: string
      test:
        description: 'Test run: use relaxed release notes/tag rules and do not sync the HTTP update feed.'
        required: true
        default: true
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  MAIN_BRANCH: main
  NODE_VERSION: '24'
  RELEASE_ROOT: releases/sync-in-desktop

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      test: ${{ steps.meta.outputs.test }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read package metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_TEST: ${{ github.event.inputs.test }}
          RSYNC_PASSWORD: ${{ secrets.RSYNC_PASSWORD }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          git fetch --force origin \
            "+refs/heads/${MAIN_BRANCH}:refs/remotes/origin/${MAIN_BRANCH}" \
            "+refs/tags/*:refs/tags/*"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TEST="${INPUT_TEST:-true}"
            if [ "$TEST" != "true" ] && [ "$GITHUB_REF_NAME" != "$MAIN_BRANCH" ]; then
              echo "::error::Real releases must be started from ${MAIN_BRANCH}, got ${GITHUB_REF_NAME}."
              exit 1
            fi
            if [ "$TEST" = "true" ]; then
              TAG="test-run-${GITHUB_RUN_NUMBER}"
            else
              TAG="${INPUT_TAG:-v${VERSION}}"
            fi
            TARGET_SHA="$(git rev-parse HEAD)"
          else
            TAG="$GITHUB_REF_NAME"
            TEST="false"
            if ! git merge-base --is-ancestor "${GITHUB_REF}^{commit}" "origin/${MAIN_BRANCH}"; then
              echo "::error::Release tag ${TAG} is not reachable from ${MAIN_BRANCH}."
              exit 1
            fi
            TARGET_SHA="$(git rev-parse "${GITHUB_REF}^{commit}")"
          fi

          if [ "$TEST" != "true" ] && [ "$TAG" != "v${VERSION}" ]; then
            echo "::error::Release tag ${TAG} does not match expected v${VERSION}."
            exit 1
          fi

          if [ "$TEST" != "true" ] && [ -z "${RSYNC_PASSWORD}" ]; then
            echo "::error::Missing secret RSYNC_PASSWORD."
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$TEST" != "true" ] && git rev-parse -q --verify "refs/tags/${TAG}^{commit}" >/dev/null; then
            TAG_SHA="$(git rev-parse "refs/tags/${TAG}^{commit}")"
            if [ "$TAG_SHA" != "$TARGET_SHA" ]; then
              echo "::error::Existing tag ${TAG} points to ${TAG_SHA}, expected current ${MAIN_BRANCH} commit ${TARGET_SHA}."
              exit 1
            fi
          fi

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "test=$TEST"
            echo "target_sha=$TARGET_SHA"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: macos-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            macos-electron-

      - name: Validate macOS signing secrets
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=0
          for name in MAC_CSC_LINK MAC_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name-}" ]; then
              echo "::error::Missing secret ${name}."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Build renderer
        run: npm run angular:prod

      - name: Build main and CLI bundles
        run: npm run webpack:all:prod

      - name: Build signed and notarized macOS binaries
        run: npx electron-builder -m --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ${{ env.RELEASE_ROOT }}/mac/*
          if-no-files-found: error

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: linux-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            linux-electron-

      - name: Install dependencies
        run: npm ci

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Build renderer
        run: npm run angular:prod

      - name: Build main and CLI bundles
        run: npm run webpack:all:prod

      - name: Build Linux binaries
        run: npx electron-builder -l --publish never

      - name: Upload Linux workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: ${{ env.RELEASE_ROOT }}/linux/*
          if-no-files-found: error

      - name: Upload CLI workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-release
          path: releases/sync-in-cli/sync-in-cli-${{ needs.prepare.outputs.version }}.js
          if-no-files-found: error

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare
    steps:
      - name: Preserve LF line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron
            ~\AppData\Local\electron-builder\Cache
          key: windows-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            windows-electron-

      - name: Validate SignPath configuration
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
        run: |
          set -euo pipefail

          missing=0
          for name in SIGNPATH_API_TOKEN SIGNPATH_ORGANIZATION_ID SIGNPATH_PROJECT_SLUG SIGNPATH_SIGNING_POLICY_SLUG; do
            if [ -z "${!name-}" ]; then
              echo "::error::Missing SignPath setting ${name}."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Build renderer
        run: npm run angular:prod

      - name: Build main and CLI bundles
        run: npm run webpack:all:prod

      - name: Build unsigned Windows binaries
        run: npx electron-builder -w --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload unsigned Windows installers for SignPath
        id: upload-unsigned-windows
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-windows-${{ needs.prepare.outputs.version }}
          path: ${{ env.RELEASE_ROOT }}/win/*.exe
          if-no-files-found: error
          retention-days: 1

      - name: Submit Windows installers to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-windows.outputs.artifact-id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed-windows

      - name: Replace unsigned Windows installers
        shell: pwsh
        run: |
          $unsigned = @(Get-ChildItem -Path "$env:RELEASE_ROOT/win" -Filter *.exe -File)
          $signed = @(Get-ChildItem -Path signed-windows -Recurse -Filter *.exe -File)

          if ($unsigned.Count -eq 0) {
            Write-Error "No unsigned Windows installer found before SignPath replacement."
            exit 1
          }

          if ($signed.Count -ne $unsigned.Count) {
            Write-Error "SignPath returned $($signed.Count) signed installer(s), expected $($unsigned.Count)."
            exit 1
          }

          foreach ($file in $signed) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne 'Valid') {
              Write-Error "Invalid Authenticode signature for $($file.Name): $($signature.Status)."
              exit 1
            }

            $destination = Join-Path "$env:RELEASE_ROOT/win" $file.Name
            if (-not (Test-Path $destination)) {
              Write-Error "Signed installer $($file.Name) does not match an expected unsigned installer."
              exit 1
            }

            Copy-Item -Path $file.FullName -Destination $destination -Force
          }

          foreach ($file in Get-ChildItem -Path "$env:RELEASE_ROOT/win" -Filter *.exe -File) {
            $signature = Get-AuthenticodeSignature -FilePath $file.FullName
            if ($signature.Status -ne 'Valid') {
              Write-Error "Installer remains unsigned or invalid after replacement: $($file.Name)."
              exit 1
            }
          }

      - name: Refresh Windows update metadata
        run: node build/refresh-win-latest.mjs

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ env.RELEASE_ROOT }}/win/*
          if-no-files-found: error

  manifest:
    name: Generate release manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-linux
      - build-windows
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install manifest dependencies
        run: npm ci --ignore-scripts

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Create release directories
        shell: bash
        run: mkdir -p releases/sync-in-desktop/mac releases/sync-in-desktop/linux releases/sync-in-desktop/win releases/sync-in-cli

      - name: Download macOS workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: releases/sync-in-desktop/mac

      - name: Download Linux workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: releases/sync-in-desktop/linux

      - name: Download Windows workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: releases/sync-in-desktop/win

      - name: Download CLI workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: cli-release
          path: releases/sync-in-cli

      - name: Generate manifest and CLI archives
        run: node build/manifest.mjs

      - name: Validate release payload
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          require_match() {
            local description="$1"
            shift
            if [ "$#" -eq 0 ]; then
              echo "::error::Missing ${description}."
              exit 1
            fi
          }

          require_match "macOS x64 DMG" "$RELEASE_ROOT"/mac/*-"$RELEASE_VERSION"-x64.dmg
          require_match "macOS arm64 DMG" "$RELEASE_ROOT"/mac/*-"$RELEASE_VERSION"-arm64.dmg
          require_match "Linux x64 AppImage" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-x64.AppImage
          require_match "Linux arm64 AppImage" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-arm64.AppImage
          require_match "Windows x64 installer" "$RELEASE_ROOT"/win/*-"$RELEASE_VERSION"-x64.exe
          require_match "Windows arm64 installer" "$RELEASE_ROOT"/win/*-"$RELEASE_VERSION"-arm64.exe
          require_match "macOS update metadata" "$RELEASE_ROOT"/mac/latest-mac.yml
          require_match "Linux update metadata" "$RELEASE_ROOT"/linux/latest-linux.yml
          require_match "Windows update metadata" "$RELEASE_ROOT"/win/latest.yml
          require_match "CLI zip archive" releases/sync-in-cli/*"$RELEASE_VERSION"*.zip
          require_match "CLI tar.gz archive" releases/sync-in-cli/*"$RELEASE_VERSION"*.tar.gz

          if [ ! -f releases/latest.json ]; then
            echo "::error::Missing releases/latest.json."
            exit 1
          fi

      - name: Extract changelog for current version
        if: needs.prepare.outputs.test == 'false'
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          awk -v ver="$RELEASE_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > latest-changelog.md

          if [ ! -s latest-changelog.md ]; then
            echo "::error::No changelog entry found for version ${RELEASE_VERSION}."
            exit 1
          fi

      - name: Create or update draft release
        if: needs.prepare.outputs.test == 'false'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')"
            if [ "$is_draft" != "true" ]; then
              echo "::error::Release ${RELEASE_TAG} already exists and is not a draft."
              exit 1
            fi

            gh release edit "$RELEASE_TAG" \
              --title "Sync-in Desktop ${RELEASE_VERSION}" \
              --notes-file latest-changelog.md

            asset_names="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
            if [ -n "$asset_names" ]; then
              while IFS= read -r asset_name; do
                [ -n "$asset_name" ] || continue
                echo "Deleting stale release asset: ${asset_name}"
                gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
              done <<< "$asset_names"
            fi
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --target "$RELEASE_TARGET_SHA" \
            --title "Sync-in Desktop ${RELEASE_VERSION}" \
            --notes-file latest-changelog.md \
            --draft

      - name: Upload release assets to GitHub release
        if: needs.prepare.outputs.test == 'false'
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mac_assets=("$RELEASE_ROOT"/mac/*)
          linux_assets=("$RELEASE_ROOT"/linux/*)
          win_assets=("$RELEASE_ROOT"/win/*)
          cli_archives=(releases/sync-in-cli/*.zip releases/sync-in-cli/*.tar.gz)

          gh release upload "$RELEASE_TAG" \
            "${mac_assets[@]}" \
            "${linux_assets[@]}" \
            "${win_assets[@]}" \
            releases/latest.json \
            "${cli_archives[@]}" \
            --clobber

      - name: Sync update feed
        if: needs.prepare.outputs.test == 'false'
        shell: bash
        env:
          RSYNC_PASSWORD: ${{ secrets.RSYNC_PASSWORD }}
        run: |
          set -euo pipefail

          rsync -rptoDvzc --progress \
            --exclude '.DS_Store' \
            --exclude '._*' \
            --exclude 'builder-*' \
            --exclude 'mac/mac*' \
            --exclude '*unpacked' \
            releases/ admin@releases.sync-in.org::sync-in-releases-admin

      - name: Upload manifest workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: |
            releases/latest.json
            releases/sync-in-cli/*.zip
            releases/sync-in-cli/*.tar.gz
          if-no-files-found: error
