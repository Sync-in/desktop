# Release source of truth: GitHub Actions builds every artifact from scratch and
# generates the release manifest. Real releases then update a draft GitHub release
# and upload its assets. Server deployment is done manually from the published
# GitHub release.
# Build, signing, manifest, or payload validation failures happen before the draft
# release is created or updated, so the GitHub release stays untouched.
# GitHub cannot branch-filter tag pushes; the prepare job is the preflight gate
# and every build job depends on it.
# Test rules:
# - tag push: test=false; require a tag on the latest main commit and matching v<package.json version>.
# - workflow_dispatch + test=true: main only; build, sign, generate/validate manifests, and upload
#   workflow artifacts only; use the SignPath test signing policy; do not create a GitHub release or
#   publish assets.
# - workflow_dispatch + test=false: main only; require v<package.json version>, update the draft
#   GitHub release, and upload its assets. Publish the draft release and run server
#   deployment manually.
# Windows signing flow (two SignPath requests):
# 1. Build unsigned x64/arm64 app bundles, write app-update.yml for electron-updater, then run
#    temporary NSIS builds to capture both uninstallers.
# 2. Submit one ZIP containing only app bundle executables and uninstallers; SignPath signs every .exe.
# 3. Replace only the original app bundle executables with their signed versions and rebuild NSIS while
#    the custom signing hook injects the signed uninstallers into the final installers.
#    The final NSIS build disables packElevateHelper so electron-builder does not overwrite
#    the SignPath-signed elevate.exe.
# 4. Validate the final app bundles still contain app-update.yml and only Valid Authenticode-signed
#    executables.
# 5. Submit both final NSIS installers together for their outer Authenticode signatures.
# Test runs use the SignPath test signing policy; real releases use the release signing policy.
# Real releases require every returned executable and final bundled executable to have a Valid
# Authenticode signature.
# Test runs still execute both SignPath requests and all structural checks. They skip Authenticode
# trust validation when using the test signing policy because the test certificate can be self-signed
# and untrusted by GitHub runners.
name: Release binaries

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Ignored when test=true. Empty uses v<version> for real releases.'
        required: false
        type: string
      test:
        description: 'Test run: use relaxed release notes/tag rules and do not create a GitHub release.'
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  MAIN_BRANCH: main
  NODE_VERSION: '24'
  RELEASE_ROOT: releases/sync-in-desktop

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
      test: ${{ steps.meta.outputs.test }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      use_production_signpath: ${{ steps.meta.outputs.use_production_signpath }}
      verify_windows_authenticode: ${{ steps.meta.outputs.verify_windows_authenticode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Read package metadata
        id: meta
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_TEST: ${{ github.event.inputs.test }}
        run: |
          set -euo pipefail

          VERSION="$(node -p "require('./package.json').version")"
          git fetch --force origin \
            "+refs/heads/${MAIN_BRANCH}:refs/remotes/origin/${MAIN_BRANCH}" \
            "+refs/tags/*:refs/tags/*"
          MAIN_SHA="$(git rev-parse "origin/${MAIN_BRANCH}")"

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            TEST="${INPUT_TEST:-true}"
            if [ "$GITHUB_REF_NAME" != "$MAIN_BRANCH" ]; then
              echo "::error::Manual release workflows must be started from ${MAIN_BRANCH}, got ${GITHUB_REF_NAME}."
              exit 1
            fi
            TARGET_SHA="$(git rev-parse HEAD)"
            if [ "$TARGET_SHA" != "$MAIN_SHA" ]; then
              echo "::error::Manual release workflows must run from latest ${MAIN_BRANCH} commit ${MAIN_SHA}, got ${TARGET_SHA}."
              exit 1
            fi
            if [ "$TEST" = "true" ]; then
              TAG="test-run-${GITHUB_RUN_NUMBER}"
              USE_PRODUCTION_SIGNPATH="false"
            else
              TAG="${INPUT_TAG:-v${VERSION}}"
              USE_PRODUCTION_SIGNPATH="true"
            fi
          else
            TAG="$GITHUB_REF_NAME"
            TEST="false"
            USE_PRODUCTION_SIGNPATH="true"
            if ! git merge-base --is-ancestor "${GITHUB_REF}^{commit}" "origin/${MAIN_BRANCH}"; then
              echo "::error::Release tag ${TAG} is not reachable from ${MAIN_BRANCH}."
              exit 1
            fi
            TARGET_SHA="$(git rev-parse "${GITHUB_REF}^{commit}")"
            if [ "$TARGET_SHA" != "$MAIN_SHA" ]; then
              echo "::error::Release tag ${TAG} points to ${TARGET_SHA}, expected latest ${MAIN_BRANCH} commit ${MAIN_SHA}."
              exit 1
            fi
          fi

          if [ "$TEST" != "true" ] && [ "$TAG" != "v${VERSION}" ]; then
            echo "::error::Release tag ${TAG} does not match expected v${VERSION}."
            exit 1
          fi

          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ] && [ "$TEST" != "true" ] && git rev-parse -q --verify "refs/tags/${TAG}^{commit}" >/dev/null; then
            TAG_SHA="$(git rev-parse "refs/tags/${TAG}^{commit}")"
            if [ "$TAG_SHA" != "$TARGET_SHA" ]; then
              echo "::error::Existing tag ${TAG} points to ${TAG_SHA}, expected current ${MAIN_BRANCH} commit ${TARGET_SHA}."
              exit 1
            fi
          fi

          {
            echo "version=$VERSION"
            echo "tag=$TAG"
            echo "test=$TEST"
            echo "target_sha=$TARGET_SHA"
            echo "use_production_signpath=$USE_PRODUCTION_SIGNPATH"
            echo "verify_windows_authenticode=$USE_PRODUCTION_SIGNPATH"
          } >> "$GITHUB_OUTPUT"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: |
            ~/Library/Caches/electron
            ~/Library/Caches/electron-builder
          key: macos-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            macos-electron-

      - name: Validate macOS signing secrets
        if: needs.prepare.outputs.test == 'false'
        shell: bash
        env:
          MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          missing=0
          for name in MAC_CSC_LINK MAC_CSC_KEY_PASSWORD APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID; do
            if [ -z "${!name-}" ]; then
              echo "::error::Missing secret ${name}."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Build renderer
        run: npm run angular:prod

      - name: Build main and CLI bundles
        run: npm run webpack:all:prod

      - name: Build signed and notarized macOS binaries
        if: needs.prepare.outputs.test == 'false'
        run: npx electron-builder -m --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build unsigned macOS binaries
        if: needs.prepare.outputs.test == 'true'
        run: npx electron-builder -m --publish never -c.mac.identity=null -c.mac.notarize=false
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Clean macOS workflow artifact
        shell: bash
        run: |
          node -e "
            const fs = require('node:fs');
            const path = require('node:path');
            const root = process.env.RELEASE_ROOT + '/mac';
            for (const entry of fs.readdirSync(root, { withFileTypes: true })) {
              if (entry.isDirectory() || /^builder-.*\.ya?ml$/.test(entry.name)) {
                fs.rmSync(path.join(root, entry.name), { recursive: true, force: true });
              }
            }
          "

      - name: Upload macOS workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-release
          path: ${{ env.RELEASE_ROOT }}/mac/*
          if-no-files-found: error
          retention-days: ${{ needs.prepare.outputs.test == 'true' && 1 || 30 }}
          overwrite: true

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    needs: prepare
    outputs:
      cli_source_artifact_id: ${{ steps.upload-cli-source.outputs.artifact-id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: linux-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            linux-electron-

      - name: Install dependencies
        run: npm ci

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Build renderer
        run: npm run angular:prod

      - name: Build main and CLI bundles
        run: npm run webpack:all:prod

      - name: Build Linux binaries
        run: npx electron-builder -l --publish never

      - name: Clean Linux workflow artifact
        shell: bash
        run: |
          node -e "
            const fs = require('node:fs');
            const path = require('node:path');
            const root = process.env.RELEASE_ROOT + '/linux';
            for (const entry of fs.readdirSync(root, { withFileTypes: true })) {
              if (entry.isDirectory() || /^builder-.*\.ya?ml$/.test(entry.name)) {
                fs.rmSync(path.join(root, entry.name), { recursive: true, force: true });
              }
            }
          "

      - name: Upload Linux workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: linux-release
          path: ${{ env.RELEASE_ROOT }}/linux/*
          if-no-files-found: error
          retention-days: ${{ needs.prepare.outputs.test == 'true' && 1 || 30 }}
          overwrite: true

      - name: Upload CLI source workflow artifact
        id: upload-cli-source
        uses: actions/upload-artifact@v7
        with:
          name: cli-source
          path: releases/sync-in-cli/sync-in-cli-${{ needs.prepare.outputs.version }}.js
          if-no-files-found: error
          retention-days: 1
          overwrite: true

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare
    permissions:
      contents: read
      actions: write
    env:
      SIGNPATH_SIGNING_POLICY_SLUG: ${{ needs.prepare.outputs.use_production_signpath == 'true' && vars.SIGNPATH_RELEASE_SIGNING_POLICY_SLUG || vars.SIGNPATH_TEST_SIGNING_POLICY_SLUG }}
    steps:
      - name: Preserve LF line endings
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Cache Electron
        uses: actions/cache@v5
        with:
          path: |
            ~\AppData\Local\electron
            ~\AppData\Local\electron-builder\Cache
          key: windows-electron-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            windows-electron-

      - name: Validate SignPath configuration
        shell: bash
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          SIGNPATH_TEST_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_TEST_SIGNING_POLICY_SLUG }}
          SIGNPATH_RELEASE_SIGNING_POLICY_SLUG: ${{ vars.SIGNPATH_RELEASE_SIGNING_POLICY_SLUG }}
        run: |
          set -euo pipefail

          missing=0
          for name in SIGNPATH_API_TOKEN SIGNPATH_ORGANIZATION_ID SIGNPATH_PROJECT_SLUG SIGNPATH_TEST_SIGNING_POLICY_SLUG SIGNPATH_RELEASE_SIGNING_POLICY_SLUG SIGNPATH_SIGNING_POLICY_SLUG; do
            if [ -z "${!name-}" ]; then
              echo "::error::Missing SignPath setting ${name}."
              missing=1
            fi
          done
          exit "$missing"

      - name: Install dependencies
        run: npm ci

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Build renderer
        run: npm run angular:prod

      - name: Build main and CLI bundles
        run: npm run webpack:all:prod

      - name: Build unsigned Windows app bundles
        run: npx electron-builder -w --dir --x64 --arm64 --publish never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Create Windows app update config
        shell: pwsh
        run: |
          $package = Get-Content package.json | ConvertFrom-Json
          $publishUrl = $package.build.publish[0].url
          $publishUrl = $publishUrl.Replace('${name}', $package.name).Replace('${os}', 'win')
          $publisherName = $package.build.win.publisherName[0]
          $updateConfig = @(
            'provider: generic'
            "url: $publishUrl"
            "updaterCacheDirName: $($package.name)-updater"
            'publisherName:'
            "  - `"$publisherName`""
            ''
          ) -join "`n"

          $releaseWin = Join-Path $env:RELEASE_ROOT 'win'
          foreach ($bundle in @('win-unpacked', 'win-arm64-unpacked')) {
            $resources = Join-Path $releaseWin "$bundle/resources"
            if (-not (Test-Path $resources)) {
              Write-Error "Missing Windows bundle resources directory: $resources"
              exit 1
            }

            Set-Content -Path (Join-Path $resources 'app-update.yml') -Value $updateConfig -Encoding utf8
          }

      - name: Capture unsigned NSIS uninstallers
        shell: bash
        run: |
          set -euo pipefail

          rm -rf nsis-uninstallers
          mkdir -p nsis-uninstallers/unsigned nsis-uninstallers/metadata

          export SYNC_IN_NSIS_UNINSTALLER_MODE=capture

          export SYNC_IN_NSIS_UNINSTALLER_FILE="$PWD/nsis-uninstallers/unsigned/x64__uninstaller.exe"
          export SYNC_IN_NSIS_UNINSTALLER_METADATA="$PWD/nsis-uninstallers/metadata/x64.json"
          npx electron-builder -w nsis --x64 \
            --prepackaged "$RELEASE_ROOT/win/win-unpacked" \
            --publish never \
            -c.directories.output="$RELEASE_ROOT/win-installer-capture-x64" \
            -c.win.signtoolOptions.sign=build/nsis-uninstaller-signing.cjs

          export SYNC_IN_NSIS_UNINSTALLER_FILE="$PWD/nsis-uninstallers/unsigned/arm64__uninstaller.exe"
          export SYNC_IN_NSIS_UNINSTALLER_METADATA="$PWD/nsis-uninstallers/metadata/arm64.json"
          npx electron-builder -w nsis --arm64 \
            --prepackaged "$RELEASE_ROOT/win/win-arm64-unpacked" \
            --publish never \
            -c.directories.output="$RELEASE_ROOT/win-installer-capture-arm64" \
            -c.win.signtoolOptions.sign=build/nsis-uninstaller-signing.cjs

          test -s nsis-uninstallers/unsigned/x64__uninstaller.exe
          test -s nsis-uninstallers/unsigned/arm64__uninstaller.exe
          test -s nsis-uninstallers/metadata/x64.json
          test -s nsis-uninstallers/metadata/arm64.json

          rm -rf "$RELEASE_ROOT/win-installer-capture-x64" "$RELEASE_ROOT/win-installer-capture-arm64"
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      # SignPath is configured to sign every .exe contained in submitted zip files.
      # Submit only executable files, preserving bundle-relative paths for safe replacement.
      - name: Stage unsigned Windows executables for SignPath
        run: node build/signpath-windows-executables.mjs stage

      - name: Upload unsigned Windows executables for SignPath
        id: upload-unsigned-windows-apps
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-windows-apps-${{ needs.prepare.outputs.version }}
          path: signpath-windows-apps.zip
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Submit Windows executables to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: windows-apps-and-uninstallers
          github-artifact-id: ${{ steps.upload-unsigned-windows-apps.outputs.artifact-id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed-windows-apps

      - name: Replace unsigned Windows executables
        run: node build/signpath-windows-executables.mjs replace

      - name: Verify signed Windows executables after SignPath replacement
        shell: pwsh
        env:
          VERIFY_AUTHENTICODE: ${{ needs.prepare.outputs.verify_windows_authenticode }}
        run: |
          $releaseWin = Join-Path $env:RELEASE_ROOT 'win'
          $bundles = @('win-unpacked', 'win-arm64-unpacked')
          $signedUninstallers = 'nsis-uninstallers/signed'
          $verifyAuthenticode = $env:VERIFY_AUTHENTICODE -eq 'true'

          foreach ($bundle in $bundles) {
            $bundlePath = Join-Path $releaseWin $bundle
            $mainExe = Join-Path $bundlePath 'Sync-in.exe'

            if (-not (Test-Path $mainExe)) {
              Write-Error "Missing Windows app executable after SignPath replacement: $mainExe"
              exit 1
            }

            if ($verifyAuthenticode) {
              foreach ($file in Get-ChildItem -Path $bundlePath -Recurse -Filter *.exe -File) {
                $signature = Get-AuthenticodeSignature -FilePath $file.FullName
                if ($signature.Status -ne 'Valid') {
                  Write-Error "Unsigned or invalid Windows app executable after SignPath replacement: $($file.FullName) ($($signature.Status))"
                  exit 1
                }
              }
            }
          }

          if ($verifyAuthenticode) {
            foreach ($file in Get-ChildItem -Path $signedUninstallers -Filter *.exe -File) {
              $signature = Get-AuthenticodeSignature -FilePath $file.FullName
              if ($signature.Status -ne 'Valid') {
                Write-Error "Unsigned or invalid NSIS uninstaller after SignPath replacement: $($file.FullName) ($($signature.Status))"
                exit 1
              }
            }
          }

      - name: Delete unsigned Windows executables artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ steps.upload-unsigned-windows-apps.outputs.artifact-id }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}"

      - name: Build unsigned Windows installers with signed uninstallers
        shell: bash
        run: |
          set -euo pipefail

          rm -rf nsis-uninstallers/receipts
          mkdir -p nsis-uninstallers/receipts

          export SYNC_IN_NSIS_UNINSTALLER_MODE=inject

          export SYNC_IN_NSIS_UNINSTALLER_FILE="$PWD/nsis-uninstallers/signed/x64__uninstaller.exe"
          export SYNC_IN_NSIS_UNINSTALLER_METADATA="$PWD/nsis-uninstallers/metadata/x64.json"
          export SYNC_IN_NSIS_UNINSTALLER_RECEIPT="$PWD/nsis-uninstallers/receipts/x64.json"
          npx electron-builder -w nsis --x64 \
            --prepackaged "$RELEASE_ROOT/win/win-unpacked" \
            --publish never \
            -c.directories.output="$RELEASE_ROOT/win-installer-x64" \
            -c.nsis.packElevateHelper=false \
            -c.win.signtoolOptions.sign=build/nsis-uninstaller-signing.cjs

          export SYNC_IN_NSIS_UNINSTALLER_FILE="$PWD/nsis-uninstallers/signed/arm64__uninstaller.exe"
          export SYNC_IN_NSIS_UNINSTALLER_METADATA="$PWD/nsis-uninstallers/metadata/arm64.json"
          export SYNC_IN_NSIS_UNINSTALLER_RECEIPT="$PWD/nsis-uninstallers/receipts/arm64.json"
          npx electron-builder -w nsis --arm64 \
            --prepackaged "$RELEASE_ROOT/win/win-arm64-unpacked" \
            --publish never \
            -c.directories.output="$RELEASE_ROOT/win-installer-arm64" \
            -c.nsis.packElevateHelper=false \
            -c.win.signtoolOptions.sign=build/nsis-uninstaller-signing.cjs

          test -s nsis-uninstallers/receipts/x64.json
          test -s nsis-uninstallers/receipts/arm64.json

          cp "$RELEASE_ROOT"/win-installer-x64/*-x64.exe "$RELEASE_ROOT"/win/
          cp "$RELEASE_ROOT"/win-installer-arm64/*-arm64.exe "$RELEASE_ROOT"/win/
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Verify Windows app bundles after final NSIS build
        shell: pwsh
        env:
          VERIFY_AUTHENTICODE: ${{ needs.prepare.outputs.verify_windows_authenticode }}
        run: |
          $releaseWin = Join-Path $env:RELEASE_ROOT 'win'
          foreach ($bundle in @('win-unpacked', 'win-arm64-unpacked')) {
            $bundlePath = Join-Path $releaseWin $bundle
            $updateConfig = Join-Path $bundlePath 'resources/app-update.yml'
            if (-not (Test-Path $updateConfig)) {
              Write-Error "Missing Windows app update config after final NSIS build: $updateConfig"
              exit 1
            }
          }

          if ($env:VERIFY_AUTHENTICODE -ne 'true') {
            Write-Host 'Skipping Authenticode validation for non-production SignPath policy.'
            exit 0
          }

          foreach ($bundle in @('win-unpacked', 'win-arm64-unpacked')) {
            $bundlePath = Join-Path $releaseWin $bundle
            foreach ($file in Get-ChildItem -Path $bundlePath -Recurse -Filter *.exe -File) {
              $signature = Get-AuthenticodeSignature -FilePath $file.FullName
              if ($signature.Status -ne 'Valid') {
                Write-Error "Unsigned or invalid Windows app executable after final NSIS build: $($file.FullName) ($($signature.Status))"
                exit 1
              }
            }
          }

      - name: Upload unsigned Windows installers for SignPath
        id: upload-unsigned-windows
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-windows-${{ needs.prepare.outputs.version }}
          path: ${{ env.RELEASE_ROOT }}/win/*.exe
          if-no-files-found: error
          retention-days: 1
          overwrite: true

      - name: Submit Windows installers to SignPath
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ env.SIGNPATH_SIGNING_POLICY_SLUG }}
          artifact-configuration-slug: windows-installers
          github-artifact-id: ${{ steps.upload-unsigned-windows.outputs.artifact-id }}
          github-token: ${{ github.token }}
          wait-for-completion: true
          wait-for-completion-timeout-in-seconds: 3600
          output-artifact-directory: signed-windows-installers

      - name: Replace unsigned Windows installers
        shell: pwsh
        env:
          VERIFY_AUTHENTICODE: ${{ needs.prepare.outputs.verify_windows_authenticode }}
        run: |
          $unsigned = @(Get-ChildItem -Path "$env:RELEASE_ROOT/win" -Filter *.exe -File)
          $signed = @(Get-ChildItem -Path signed-windows-installers -Recurse -Filter *.exe -File)
          $verifyAuthenticode = $env:VERIFY_AUTHENTICODE -eq 'true'

          if ($unsigned.Count -eq 0) {
            Write-Error "No unsigned Windows installer found before SignPath replacement."
            exit 1
          }

          if ($signed.Count -ne $unsigned.Count) {
            Write-Error "SignPath returned $($signed.Count) signed installer(s), expected $($unsigned.Count)."
            exit 1
          }

          foreach ($file in $signed) {
            if ($verifyAuthenticode) {
              $signature = Get-AuthenticodeSignature -FilePath $file.FullName
              if ($signature.Status -ne 'Valid') {
                Write-Error "Invalid Authenticode signature for $($file.Name): $($signature.Status)."
                exit 1
              }
            }

            $destination = Join-Path "$env:RELEASE_ROOT/win" $file.Name
            if (-not (Test-Path $destination)) {
              Write-Error "Signed installer $($file.Name) does not match an expected unsigned installer."
              exit 1
            }

            Copy-Item -Path $file.FullName -Destination $destination -Force
          }

          if ($verifyAuthenticode) {
            foreach ($file in Get-ChildItem -Path "$env:RELEASE_ROOT/win" -Filter *.exe -File) {
              $signature = Get-AuthenticodeSignature -FilePath $file.FullName
              if ($signature.Status -ne 'Valid') {
                Write-Error "Installer remains unsigned or invalid after replacement: $($file.Name)."
                exit 1
              }
            }
          }

      - name: Delete unsigned Windows installers artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ steps.upload-unsigned-windows.outputs.artifact-id }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}"

      # Windows installers are Authenticode-signed after electron-builder creates
      # the original blockmaps. Signing changes the EXE bytes, so stale
      # .exe.blockmap files are removed, fresh blockmaps are generated from the
      # final signed EXEs, and latest.yml is regenerated from the same files.
      - name: Refresh Windows update metadata
        run: node build/refresh-win-latest.mjs

      - name: Clean Windows workflow artifact
        shell: pwsh
        run: |
          Get-ChildItem -Path "$env:RELEASE_ROOT/win" -Directory |
            Remove-Item -Recurse -Force
          Get-ChildItem -Path "$env:RELEASE_ROOT/win" -File |
            Where-Object { $_.Name -match '^builder-.*\.ya?ml$' } |
            Remove-Item -Force

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-release
          path: ${{ env.RELEASE_ROOT }}/win/*
          if-no-files-found: error
          retention-days: ${{ needs.prepare.outputs.test == 'true' && 1 || 30 }}
          overwrite: true

  manifest:
    name: Generate release manifest
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build-macos
      - build-linux
      - build-windows
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install manifest dependencies
        run: npm ci --ignore-scripts

      - name: Clean release output
        run: |
          node -e "require('node:fs').rmSync('releases', { recursive: true, force: true })"

      - name: Create release directories
        shell: bash
        run: mkdir -p releases/sync-in-desktop/mac releases/sync-in-desktop/linux releases/sync-in-desktop/win releases/sync-in-cli

      - name: Download macOS workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-release
          path: releases/sync-in-desktop/mac

      - name: Download Linux workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release
          path: releases/sync-in-desktop/linux

      - name: Download Windows workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-release
          path: releases/sync-in-desktop/win

      - name: Download CLI source workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: cli-source
          path: releases/sync-in-cli

      - name: Generate manifest and CLI archives
        run: node build/manifest.mjs

      - name: Validate release payload
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          require_match() {
            local description="$1"
            shift
            if [ "$#" -eq 0 ]; then
              echo "::error::Missing ${description}."
              exit 1
            fi
          }

          require_match "macOS x64 DMG" "$RELEASE_ROOT"/mac/*-"$RELEASE_VERSION"-x64.dmg
          require_match "macOS arm64 DMG" "$RELEASE_ROOT"/mac/*-"$RELEASE_VERSION"-arm64.dmg
          require_match "Linux x86_64 AppImage" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-x86_64.AppImage
          require_match "Linux arm64 AppImage" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-arm64.AppImage
          require_match "Linux amd64 DEB" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-amd64.deb
          require_match "Linux arm64 DEB" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-arm64.deb
          require_match "Windows x64 installer" "$RELEASE_ROOT"/win/*-"$RELEASE_VERSION"-x64.exe
          require_match "Windows arm64 installer" "$RELEASE_ROOT"/win/*-"$RELEASE_VERSION"-arm64.exe
          require_match "macOS update metadata" "$RELEASE_ROOT"/mac/latest-mac.yml
          require_match "Linux update metadata" "$RELEASE_ROOT"/linux/latest-linux.yml
          require_match "Linux arm64 update metadata" "$RELEASE_ROOT"/linux/latest-linux-arm64.yml
          require_match "Windows update metadata" "$RELEASE_ROOT"/win/latest.yml
          require_match "CLI zip archive" releases/sync-in-cli/*"$RELEASE_VERSION"*.zip
          require_match "CLI tar.gz archive" releases/sync-in-cli/*"$RELEASE_VERSION"*.tar.gz

          if [ ! -f releases/latest.json ]; then
            echo "::error::Missing releases/latest.json."
            exit 1
          fi

      - name: Upload CLI release workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: cli-release
          path: |
            releases/sync-in-cli/*.zip
            releases/sync-in-cli/*.tar.gz
          if-no-files-found: error
          retention-days: ${{ needs.prepare.outputs.test == 'true' && 1 || 30 }}
          overwrite: true

      - name: Upload manifest workflow artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-manifest
          path: releases/latest.json
          if-no-files-found: error
          retention-days: ${{ needs.prepare.outputs.test == 'true' && 1 || 30 }}
          overwrite: true

  publish-docker-repository:
    name: Publish Docker release repository
    if: needs.prepare.outputs.test == 'false'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - manifest
    permissions:
      contents: read
      actions: read
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          persist-credentials: false

      - name: Validate Docker Hub secrets
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          missing=0
          for name in DOCKERHUB_USERNAME DOCKERHUB_TOKEN; do
            if [ -z "${!name-}" ]; then
              echo "::error::Missing secret ${name}."
              missing=1
            fi
          done
          exit "$missing"

      - name: Create release directories
        shell: bash
        run: mkdir -p releases/sync-in-desktop/mac releases/sync-in-desktop/linux releases/sync-in-desktop/win releases/sync-in-cli

      - name: Download macOS workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-release
          path: releases/sync-in-desktop/mac

      - name: Download Linux workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release
          path: releases/sync-in-desktop/linux

      - name: Download Windows workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-release
          path: releases/sync-in-desktop/win

      - name: Download CLI release workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: cli-release
          path: releases/sync-in-cli

      - name: Download manifest workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: release-manifest
          path: releases

      - name: Validate Docker release repository payload
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          require_match() {
            local description="$1"
            shift
            if [ "$#" -eq 0 ]; then
              echo "::error::Missing ${description}."
              exit 1
            fi
          }

          require_match "macOS x64 DMG" "$RELEASE_ROOT"/mac/*-"$RELEASE_VERSION"-x64.dmg
          require_match "macOS arm64 DMG" "$RELEASE_ROOT"/mac/*-"$RELEASE_VERSION"-arm64.dmg
          require_match "Linux x86_64 AppImage" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-x86_64.AppImage
          require_match "Linux arm64 AppImage" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-arm64.AppImage
          require_match "Linux amd64 DEB" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-amd64.deb
          require_match "Linux arm64 DEB" "$RELEASE_ROOT"/linux/*-"$RELEASE_VERSION"-arm64.deb
          require_match "Windows x64 installer" "$RELEASE_ROOT"/win/*-"$RELEASE_VERSION"-x64.exe
          require_match "Windows arm64 installer" "$RELEASE_ROOT"/win/*-"$RELEASE_VERSION"-arm64.exe
          require_match "macOS update metadata" "$RELEASE_ROOT"/mac/latest-mac.yml
          require_match "Linux update metadata" "$RELEASE_ROOT"/linux/latest-linux.yml
          require_match "Linux arm64 update metadata" "$RELEASE_ROOT"/linux/latest-linux-arm64.yml
          require_match "Windows update metadata" "$RELEASE_ROOT"/win/latest.yml
          require_match "CLI zip archive" releases/sync-in-cli/*"$RELEASE_VERSION"*.zip
          require_match "CLI tar.gz archive" releases/sync-in-cli/*"$RELEASE_VERSION"*.tar.gz

          if [ ! -f releases/latest.json ]; then
            echo "::error::Missing releases/latest.json."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker release repository
        run: npm run docker:buildx

  publish:
    name: Publish release
    if: needs.prepare.outputs.test == 'false'
    runs-on: ubuntu-latest
    needs:
      - prepare
      - manifest
      - publish-docker-repository
    permissions:
      contents: write
      actions: read
    env:
      GH_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}
      RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.target_sha }}
          persist-credentials: false

      - name: Validate release GitHub token
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${GH_TOKEN-}" ]; then
            echo "::error::Missing RELEASE_GITHUB_TOKEN secret. Use a personal access token from the account that should appear as the GitHub release author."
            exit 1
          fi

      - name: Create release directories
        shell: bash
        run: mkdir -p releases/sync-in-desktop/mac releases/sync-in-desktop/linux releases/sync-in-desktop/win releases/sync-in-cli

      - name: Download macOS workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-release
          path: releases/sync-in-desktop/mac

      - name: Download Linux workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: linux-release
          path: releases/sync-in-desktop/linux

      - name: Download Windows workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-release
          path: releases/sync-in-desktop/win

      - name: Download CLI release workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: cli-release
          path: releases/sync-in-cli

      - name: Download manifest workflow artifact
        uses: actions/download-artifact@v8
        with:
          name: release-manifest
          path: releases

      - name: Extract changelog for current version
        shell: bash
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          awk -v ver="$RELEASE_VERSION" '
            $0 ~ "^## \\[" ver "\\]" { capture=1; next }
            capture && /^## / { exit }
            capture { print }
          ' CHANGELOG.md > latest-changelog.md

          if [ ! -s latest-changelog.md ]; then
            echo "::error::No changelog entry found for version ${RELEASE_VERSION}."
            exit 1
          fi

      - name: Create or update draft release
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_TARGET_SHA: ${{ needs.prepare.outputs.target_sha }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            is_draft="$(gh release view "$RELEASE_TAG" --json isDraft --jq '.isDraft')"
            if [ "$is_draft" != "true" ]; then
              echo "::error::Release ${RELEASE_TAG} already exists and is not a draft."
              exit 1
            fi

            gh release edit "$RELEASE_TAG" \
              --title "Sync-in Desktop ${RELEASE_VERSION}" \
              --notes-file latest-changelog.md

            asset_names="$(gh release view "$RELEASE_TAG" --json assets --jq '.assets[].name')"
            if [ -n "$asset_names" ]; then
              while IFS= read -r asset_name; do
                [ -n "$asset_name" ] || continue
                echo "Deleting stale release asset: ${asset_name}"
                gh release delete-asset "$RELEASE_TAG" "$asset_name" --yes
              done <<< "$asset_names"
            fi
            exit 0
          fi

          gh release create "$RELEASE_TAG" \
            --target "$RELEASE_TARGET_SHA" \
            --title "Sync-in Desktop ${RELEASE_VERSION}" \
            --notes-file latest-changelog.md \
            --draft

      - name: Upload release assets to GitHub release
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          mac_assets=("$RELEASE_ROOT"/mac/*)
          linux_assets=("$RELEASE_ROOT"/linux/*)
          win_assets=("$RELEASE_ROOT"/win/*)
          cli_archives=(releases/sync-in-cli/*.zip releases/sync-in-cli/*.tar.gz)

          gh release upload "$RELEASE_TAG" \
            "${mac_assets[@]}" \
            "${linux_assets[@]}" \
            "${win_assets[@]}" \
            releases/latest.json \
            "${cli_archives[@]}" \
            --clobber

  cleanup:
    name: Clean workflow artifacts
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    needs:
      - build-linux
      - manifest
    permissions:
      contents: read
      actions: write
    steps:
      - name: Delete CLI source workflow artifact
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_ID: ${{ needs.build-linux.outputs.cli_source_artifact_id }}
        run: gh api --method DELETE "repos/${GITHUB_REPOSITORY}/actions/artifacts/${ARTIFACT_ID}"
